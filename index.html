<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Workshop</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    :root {
      --orange-start: #E8520E;
      --orange-end: #FF8C42;
      --bg: #FAFAF8;
      --text: #1A1A1A;
      --text-secondary: #666666;
      --code-bg: #F5F2EF;
      --code-text: #2D2D2D;
      --red: #E53E3E;
      --yellow: #D69E2E;
      --blue: #3182CE;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      scroll-padding-top: 70px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .section {
      min-height: 100vh;
      scroll-snap-align: start;
      padding: 80px 10% 60px;
    }

    .section-tall {
      min-height: auto;
    }

    #main-nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      background: rgba(250, 250, 248, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #eee;
      padding: 12px 10%;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.7rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }

    .nav-dot:hover {
      background: rgba(232, 82, 14, 0.08);
    }

    .nav-dot.active {
      background: var(--orange-start);
      color: white;
    }

    .nav-sep {
      color: #ddd;
      font-size: 0.7rem;
      margin: 0 4px;
    }
  </style>
</head>
<body>

  <nav id="main-nav">
    <a href="#s-1-1" class="nav-dot active">1.1</a>
    <a href="#s-1-2" class="nav-dot">1.2</a>
    <a href="#s-1-3" class="nav-dot">1.3</a>
    <a href="#s-1-4" class="nav-dot">1.4</a>
    <a href="#s-1-5" class="nav-dot">1.5</a>
    <a href="#s-1-6" class="nav-dot">1.6</a>
    <a href="#s-1-7" class="nav-dot">1.7</a>
    <span class="nav-sep">|</span>
    <a href="#s-2-1" class="nav-dot">2.1</a>
    <a href="#s-2-2" class="nav-dot">2.2</a>
    <a href="#s-2-3" class="nav-dot">2.3</a>
  </nav>

  <section id="s-1-1" class="section"></section>
  <section id="s-1-2" class="section"></section>
  <section id="s-1-3" class="section"></section>
  <section id="s-1-4" class="section section-tall"></section>
  <section id="s-1-5" class="section"></section>
  <section id="s-1-6" class="section"></section>
  <section id="s-1-7" class="section"></section>
  <section id="s-2-1" class="section"></section>
  <section id="s-2-2" class="section"></section>
  <section id="s-2-3" class="section"></section>

  <noscript>Please enable JavaScript to view this page properly.</noscript>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const navDots = document.querySelectorAll('.nav-dot');

    document.querySelectorAll('section[id]').forEach(section => {
      ScrollTrigger.create({
        trigger: section,
        start: 'top center',
        end: 'bottom center',
        onToggle: self => {
          if (self.isActive) {
            navDots.forEach(d => d.classList.remove('active'));
            const dot = document.querySelector(`.nav-dot[href="#${section.id}"]`);
            if (dot) dot.classList.add('active');
          }
        }
      });
    });
  </script>

</body>
</html>
